name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: '2.1.14'
  ANCHOR_VERSION: '0.32.1'
  RUST_TOOLCHAIN: '1.85.0'
  NODE_VERSION: '22'

jobs:
  programs:
    name: Programs Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Cache Solana Binaries
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-${{ runner.os }}-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to Path
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Cache Anchor AVM
        id: cache-avm
        uses: actions/cache@v4
        with:
          path: ~/.avm
          key: avm-${{ runner.os }}-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor AVM & CLI
        if: steps.cache-avm.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          export PATH="$HOME/.avm/bin:$PATH"
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Add AVM to Path
        run: echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Build Programs
        run: anchor build

      - name: Run Rust Unit Tests
        run: cargo test --workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase

      - name: Run Integration Tests
        run: anchor test --skip-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-artifacts
          path: target/

  sdk-test:
    name: SDK Tests
    runs-on: ubuntu-latest
    needs: programs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @stbr/sss-token build

      - name: Run SDK tests
        run: pnpm test:sdk

  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    needs: programs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @stbr/sss-token build

      - name: Check formatting
        run: pnpm format:check

      - name: Build backend
        run: pnpm --filter solana-stablecoin-backend build

      - name: Build frontend
        run: pnpm --filter solana-stablecoin-frontend build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: programs
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: program-artifacts
          path: target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          mkdir -p target/idl target/types
          docker compose build backend
